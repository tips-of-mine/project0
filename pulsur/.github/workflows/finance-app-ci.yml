# pulsur/.github/workflows/finance-app-ci.yml
name: Finance App CI

on:
  push:
    branches:
      - main
    paths:
      - 'pulsur/finance-app/**'
  pull_request:
    paths:
      - 'pulsur/finance-app/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pulsur/finance-app
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Lint Code
        run: npm run lint

      - name: Run Tests
        run: npm test # Updated from echo placeholder
