name: Identification App CI

on:
  push:
    branches:
      - main # Or your primary development branch
    paths:
      - 'pulsur/identification-app/**'
  pull_request:
    paths:
      - 'pulsur/identification-app/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pulsur/identification-app
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' 

      - name: Install Dependencies
        run: npm install

      - name: Lint Code
        run: npm run lint # Updated

      - name: Run Tests
        run: npm test # Updated
