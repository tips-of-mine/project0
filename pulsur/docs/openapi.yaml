      security:
        - UserSessionToken: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '202': # Accepted for processing
          description: CSV export request accepted.
          content:
            application/json:
              schema:
